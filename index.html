<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritual CV — Cyber-Neon Identity Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js" type="text/javascript"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #03000a;
            background-image: 
                radial-gradient(at 0% 0%, rgba(168, 85, 247, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.15) 0px, transparent 50%),
                radial-gradient(at 50% 50%, #03000a 0px, #010003 100%);
            color: #f8fafc;
            overflow-x: hidden;
        }

        .heading-cyber {
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.3), 0 0 30px rgba(16, 185, 129, 0.2);
        }

        /* Neon Custom Glow Levels */
        .glow-bitty { text-shadow: 0 0 8px rgba(0, 191, 255, 0.6); color: #00bfff; }
        .glow-ritty { text-shadow: 0 0 12px rgba(168, 85, 247, 0.7); color: #c084fc; }
        .glow-ritualist { text-shadow: 0 0 16px rgba(16, 185, 129, 0.9); color: #34d399; animation: pulseGlow 2s infinite alternate; }
        .glow-zealot { text-shadow: 0 0 20px rgba(139, 92, 246, 1), 0 0 40px rgba(139, 92, 246, 0.4); color: #a78bfa; animation: pulseGlow 1.5s infinite alternate; }
        .glow-radiant { text-shadow: 0 0 25px rgba(234, 179, 8, 1), 0 0 50px rgba(234, 179, 8, 0.6); color: #fde047; animation: hyperSparkle 1s infinite alternate; }

        @keyframes pulseGlow {
            0% { opacity: 0.8; filter: drop-shadow(0 0 2px currentColor); }
            100% { opacity: 1; filter: drop-shadow(0 0 12px currentColor); }
        }

        @keyframes hyperSparkle {
            0% { transform: scale(1); filter: drop-shadow(0 0 4px #eab308); }
            100% { transform: scale(1.03); filter: drop-shadow(0 0 22px #fde047); }
        }

        .cyber-border {
            position: relative;
            background: rgba(10, 5, 22, 0.7);
            border: 1px solid rgba(16, 185, 129, 0.2);
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.5), inset 0 0 15px rgba(16, 185, 129, 0.05);
        }

        .cyber-border::before {
            content: '';
            position: absolute;
            top: -1px; left: -1px; right: -1px; bottom: -1px;
            background: linear-gradient(45deg, transparent 40%, rgba(16, 185, 129, 0.4), transparent 60%);
            z-index: -1;
            border-radius: inherit;
            pointer-events: none;
        }

        .neon-input:focus {
            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.3), inset 0 0 8px rgba(16, 185, 129, 0.1);
        }

        .custom-radio:checked + .radio-card {
            border-color: currentColor;
            background: rgba(255, 255, 255, 0.03);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-8">

    <header class="w-full max-w-5xl flex justify-between items-center mb-10 border-b border-slate-900 pb-5">
        <div class="flex items-center gap-3">
            <div class="h-11 w-11 rounded-xl bg-black border-2 border-emerald-500 flex items-center justify-center shadow-[0_0_15px_rgba(16,185,129,0.4)]">
                <span class="text-xl font-black heading-cyber text-emerald-400">R</span>
            </div>
            <div>
                <h1 class="text-2xl font-black tracking-widest heading-cyber text-white">RITUAL <span class="text-emerald-400">CV</span></h1>
                <p class="text-[9px] tracking-[0.25em] text-purple-400 font-bold uppercase">DeAI Identity Protocol</p>
            </div>
        </div>
        <button id="walletBtn" onclick="connectWallet()" class="px-5 py-2.5 rounded-xl font-bold border border-emerald-500/50 bg-emerald-950/30 text-emerald-400 transition-all duration-300 hover:bg-emerald-500 hover:text-black hover:shadow-[0_0_25px_rgba(16,185,129,0.5)] flex items-center gap-2 cursor-pointer">
            <i class="fa-solid fa-bolt-lightning"></i> <span id="walletText">Connect System</span>
        </button>
    </header>

    <main class="w-full max-w-4xl flex flex-col items-center justify-center flex-grow">
        
        <section class="w-full cyber-border rounded-3xl p-6 md:p-10 transition-all duration-500">
            <div class="mb-8 border-l-4 border-purple-500 pl-4">
                <h2 class="text-xl md:text-2xl font-black heading-cyber tracking-wide text-white">INITIALIZE IDENTITY INTERFACE</h2>
                <p class="text-xs text-gray-400 mt-1">Fill out parameters to formulate your on-chain generative card asset.</p>
            </div>
            
            <form id="cvForm" onsubmit="handleFormSubmit(event)" class="space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-purple-400 mb-2">Agent Full Name</label>
                        <input type="text" id="formName" required placeholder="Sarthak Pandey" class="w-full px-4 py-3 rounded-xl bg-slate-950/80 border border-slate-800 text-gray-200 neon-input transition">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-purple-400 mb-2">Upload Profile Core (Image)</label>
                        <input type="file" id="formPhoto" accept="image/*" required onchange="previewImage(event)" class="w-full px-4 py-2 rounded-xl bg-slate-950/80 border border-slate-800 text-sm text-gray-400 file:mr-4 file:py-1 file:px-3 file:rounded-md file:border file:border-emerald-500 file:bg-transparent file:text-emerald-400 file:font-bold hover:file:bg-emerald-500 hover:file:text-black file:transition cursor-pointer neon-input">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-purple-400 mb-2">X / Twitter Handler</label>
                        <div class="relative">
                            <span class="absolute left-4 top-3.5 text-slate-600"><i class="fa-brands fa-x-twitter"></i></span>
                            <input type="text" id="formTwitter" required placeholder="username" class="w-full pl-10 pr-4 py-3 rounded-xl bg-slate-950/80 border border-slate-800 text-gray-200 neon-input transition">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-purple-400 mb-2">Discord Handle</label>
                        <div class="relative">
                            <span class="absolute left-4 top-3.5 text-slate-600"><i class="fa-brands fa-discord"></i></span>
                            <input type="text" id="formDiscord" required placeholder="username#0000" class="w-full pl-10 pr-4 py-3 rounded-xl bg-slate-950/80 border border-slate-800 text-gray-200 neon-input transition">
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-purple-400 mb-3">Select Active Ecosystem Role Cluster</label>
                    <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-4">
                        
                        <label class="relative cursor-pointer">
                            <input type="radio" name="ritualRole" value="Bitty" checked class="hidden custom-radio" onclick="updateRoleUI('bitty')">
                            <div class="radio-card flex flex-col items-center justify-center p-4 rounded-xl border border-slate-900 bg-black/40 transition-all text-sky-400">
                                <span class="font-black tracking-wide text-sm glow-bitty">Bitty</span>
                                <span class="text-[9px] text-slate-500 mt-1 font-bold">CYAN MATRIX</span>
                            </div>
                        </label>

                        <label class="relative cursor-pointer">
                            <input type="radio" name="ritualRole" value="Ritty" class="hidden custom-radio" onclick="updateRoleUI('ritty')">
                            <div class="radio-card flex flex-col items-center justify-center p-4 rounded-xl border border-slate-900 bg-black/40 transition-all text-purple-400">
                                <span class="font-black tracking-wide text-sm glow-ritty">Ritty</span>
                                <span class="text-[9px] text-slate-500 mt-1 font-bold">PURPLE PULSE</span>
                            </div>
                        </label>

                        <label class="relative cursor-pointer">
                            <input type="radio" name="ritualRole" value="Ritualist 🟢🔥" class="hidden custom-radio" onclick="updateRoleUI('ritualist')">
                            <div class="radio-card flex flex-col items-center justify-center p-4 rounded-xl border border-slate-900 bg-black/40 transition-all text-emerald-400">
                                <span class="font-black tracking-wide text-sm glow-ritualist text-center">Ritualist 🟢🔥</span>
                                <span class="text-[9px] text-slate-500 mt-1 font-bold">EMERALD FLAME</span>
                            </div>
                        </label>

                        <label class="relative cursor-pointer">
                            <input type="radio" name="ritualRole" value="Zealot" class="hidden custom-radio" onclick="updateRoleUI('zealot')">
                            <div class="radio-card flex flex-col items-center justify-center p-4 rounded-xl border border-slate-900 bg-black/40 transition-all text-violet-400">
                                <span class="font-black tracking-wide text-sm glow-zealot">Zealot</span>
                                <span class="text-[9px] text-slate-500 mt-1 font-bold">AMETHYST GLOW</span>
                            </div>
                        </label>

                        <label class="relative cursor-pointer">
                            <input type="radio" name="ritualRole" value="Radiant Ritualist" class="hidden custom-radio" onclick="updateRoleUI('radiant')">
                            <div class="radio-card flex flex-col items-center justify-center p-4 rounded-xl border border-slate-900 bg-black/40 transition-all text-yellow-400">
                                <span class="font-black tracking-wide text-sm glow-radiant text-center">Radiant ✨</span>
                                <span class="text-[9px] text-slate-500 mt-1 font-bold">MAX SPARKLE</span>
                            </div>
                        </label>

                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-purple-400 mb-2">Why do you want to join Ritual Cluster?</label>
                    <textarea id="formWhy" rows="3" required placeholder="Describe your sync intent with decentralized AI architecture..." class="w-full px-4 py-3 rounded-xl bg-slate-950/80 border border-slate-800 text-gray-200 neon-input transition resize-none"></textarea>
                </div>

                <button type="submit" class="w-full py-4 rounded-xl font-black heading-cyber bg-gradient-to-r from-emerald-500 via-teal-500 to-purple-600 text-black transition-all shadow-[0_0_35px_rgba(16,185,129,0.25)] hover:shadow-[0_0_45px_rgba(16,185,129,0.5)] hover:scale-[1.01] active:scale-[0.99] flex items-center justify-center gap-3 text-lg cursor-pointer">
                    <i class="fa-solid fa-dice-d20 animate-spin-slow"></i> EXECUTE NEON MINT SEQUENCE
                </button>
            </form>
        </section>

        <canvas id="cardCanvas" width="1280" height="720" class="hidden"></canvas>

        <div id="successPopup" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/90 backdrop-blur-xl hidden transition-all duration-300">
            <div class="bg-black border-2 border-emerald-500/80 max-w-3xl w-full rounded-3xl p-6 relative flex flex-col items-center shadow-[0_0_60px_rgba(16,185,129,0.3)] scale-95 transition-transform duration-300" id="popupContainer">
                
                <button onclick="closePopup()" class="absolute top-4 right-4 text-slate-500 hover:text-white transition text-xl cursor-pointer"><i class="fa-solid fa-circle-xmark"></i></button>
                
                <div class="text-center mb-5">
                    <h3 class="text-2xl md:text-4xl font-black heading-cyber text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 via-teal-300 to-purple-400">🎉 IDENTITY CONSTRUCTED!</h3>
                    <p class="text-[10px] tracking-widest text-purple-400 font-bold uppercase mt-1">Transaction verified successfully on Ritual Chain</p>
                </div>

                <div class="w-full aspect-[16/9] bg-neutral-950 rounded-2xl overflow-hidden border border-slate-800 shadow-[0_0_30px_rgba(0,0,0,0.8)] relative">
                    <img id="outputCardImage" class="w-full h-full object-cover" src="" alt="Ritual Matrix Grid Core Asset">
                </div>

                <div class="flex flex-col sm:flex-row gap-4 w-full mt-6">
                    <a id="downloadBtn" download="Ritual_Neon_CV.png" class="flex-1 py-3.5 text-center rounded-xl font-black heading-cyber bg-emerald-400 text-black hover:bg-emerald-300 transition text-sm flex items-center justify-center gap-2 shadow-[0_0_20px_rgba(52,211,153,0.3)] cursor-pointer">
                        <i class="fa-solid fa-download"></i> EXPORT HIGH-RES IMAGE
                    </a>
                    <button onclick="closePopup()" class="flex-1 py-3.5 text-center rounded-xl font-bold border border-slate-800 text-slate-400 hover:text-white hover:bg-slate-900/50 transition text-sm cursor-pointer">
                        TERMINATE INTERFACE
                    </button>
                </div>
            </div>
        </div>

    </main>

    <footer class="w-full text-center text-[10px] font-bold tracking-widest text-slate-700 uppercase mt-12">
        Ritual CV Protocol // Core Sync Version 2.0.0-Neon
    </footer>

    <script>
        let userWalletAddress = "";
        let uploadedImageBase64 = "";
        let selectedRoleStyle = "bitty";

        // LIVE SMART CONTRACT ADDRESS
        const contractAddress = "0x5F3E3FC2f89006794065ADd88B45bc5c7Ea3C0D4"; 
        
        // Solidity Struct / Tuple Mapping Configuration
        const contractABI = [
            "function mintCV((string name, string twitter, string discord, string role, string whyJoin, string imageIpfs) input) external"
        ];

        function previewImage(event) {
            const reader = new FileReader();
            reader.onload = function() {
                uploadedImageBase64 = reader.result;
            }
            reader.readAsDataURL(event.target.files[0]);
        }

        function updateRoleUI(role) {
            selectedRoleStyle = role;
        }

        // 1. REAL WALLET CONNECTION PIPELINE
        async function connectWallet() {
            if (window.ethereum) {
                try {
                    const provider = new ethers.providers.Web3Provider(window.ethereum);
                    await provider.send("eth_requestAccounts", []);
                    const signer = provider.getSigner();
                    userWalletAddress = await signer.getAddress();
                    
                    document.getElementById("walletText").innerText = "SYS: " + userWalletAddress.substring(0,6) + "..." + userWalletAddress.substring(38).toUpperCase();
                    document.getElementById("walletBtn").classList.add("bg-emerald-500", "text-black", "shadow-[0_0_20px_rgba(16,185,129,0.4)]");
                } catch (error) {
                    alert("क्रिप्टो वॉलेट कनेक्शन खारिज कर दिया गया: " + error.message);
                }
            } else {
                alert("त्रुटि: ब्राउज़र में MetaMask या कोई Web3 वॉलेट इंजन नहीं मिला!");
            }
        }

        // 2. REAL ON-CHAIN MINTING PIPELINE (STRICTLY SECURE)
        async function handleFormSubmit(event) {
            event.preventDefault();

            if (!userWalletAddress) {
                alert("घातक त्रुटि: कृपया मिंटिंग शुरू करने से पहले ऊपर दाईं ओर स्थित बटन से अपना रियल वेब3 वॉलेट कनेक्ट करें।");
                return;
            }

            const name = document.getElementById("formName").value;
            const twitter = document.getElementById("formTwitter").value;
            const discord = document.getElementById("formDiscord").value;
            const role = document.querySelector('input[name="ritualRole"]:checked').value;
            const whyJoin = document.getElementById("formWhy").value;

            const submitBtn = event.target.querySelector('button[type="submit"]');
            const nativeBtnContent = submitBtn.innerHTML;
            
            try {
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                const signer = provider.getSigner();
                const contract = new ethers.Contract(contractAddress, contractABI, signer);

                // UI को लोडिंग स्टेट पर ले जाएं
                submitBtn.innerHTML = `<i class="fa-solid fa-arrows-spin animate-spin"></i> ब्रॉडकास्टिंग ऑन-चेन ब्लॉक... कृपया मेटामास्क में कन्फर्म करें`;
                submitBtn.disabled = true;

                const mintInputData = {
                    name: name,
                    twitter: twitter,
                    discord: discord,
                    role: role,
                    whyJoin: whyJoin,
                    imageIpfs: "ipfs://QmNeonRitualCardPlaceholder"
                };

                // STEP A: मेटामास्क पर रियल ट्रांजेक्शन ट्रिगर करें
                const tx = await contract.mintCV(mintInputData);
                
                // STEP B: ऑन-चेन ब्लॉक माइनिंग/वेरिफिकेशन का वेट करें
                submitBtn.innerHTML = `<i class="fa-solid fa-circle-notch animate-spin"></i> ब्लॉकचेन वेरिफिकेशन जारी है... [TX: ${tx.hash.substring(0,10)}...]`;
                const receipt = await tx.wait();

                // STEP C: रसीद मिलते ही स्टेटस चेक करें। सक्सेस होने पर ही कार्ड रेंडर होगा
                if (receipt.status === 1) {
                    console.log("On-Chain Mint Successful. Receipt:", receipt);
                    
                    generateIdentityCard(name, twitter, discord, role, whyJoin, () => {
                        submitBtn.innerHTML = nativeBtnContent;
                        submitBtn.disabled = false;
                        openPopup();
                    });
                } else {
                    throw new Error("ब्लॉकचेन ट्रांजेक्शन निष्पादित तो हुआ पर ब्लॉक में विफल (Reverted) हो गया।");
                }

            } catch (error) {
                console.error("ऑन-चेन मिंटिंग त्रुटि:", error);
                alert("ऑन-चेन मिंटिंग विफल! ट्रांजेक्शन रोक दिया गया है। विवरण: " + (error.data?.message || error.message));
                
                // बटन रिसेट करें ताकि यूजर दोबारा ट्राई कर सके
                submitBtn.innerHTML = nativeBtnContent;
                submitBtn.disabled = false;
            }
        }

        // 3
